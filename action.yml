name: 'ExternalAim'
description: 'Here Description.... Aimbot la-la-la'
author: 'GitHubUser'

branding:
  icon: 'crosshair'
  color: 'green'

inputs:
  game-path:
    description: 'Путь к исполняемому файлу игры'
    required: true
    default: './game.exe'
  config-file:
    description: 'Путь к файлу конфигурации GUI'
    required: false
    default: './config/settings.json'
  resolution:
    description: 'Разрешение окна (ширина x высота)'
    required: false
    default: '1920x1080'
  fullscreen:
    description: 'Запуск в полноэкранном режиме (true/false)'
    required: false
    default: 'false'
  language:
    description: 'Язык интерфейса (ru/en/de/fr)'
    required: false
    default: 'en'
  log-level:
    description: 'Уровень логирования (debug/info/warn/error)'
    required: false
    default: 'info'

outputs:
  pid:
    description: 'ID запущенного процесса'
  status:
    description: 'Статус выполнения (success/failed)'
  log-file:
    description: 'Путь к файлу лога'
  session-id:
    description: 'Уникальный идентификатор сессии'

runs:
  using: 'node20'
  main: 'dist/index.js'
